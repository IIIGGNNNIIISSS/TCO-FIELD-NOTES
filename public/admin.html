<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c0b16c">
  <title>Administration — TCo_NET</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/"><span class="brand-mark"></span> TCo_NET</a>
      <a class="button secondary" href="/">Voir le site</a>
    </div>
  </header>

  <main class="admin-shell container">
    <section id="login-panel" class="form-card" style="max-width:520px;margin:4rem auto">
      <p class="eyebrow">Espace protégé en ligne</p>
      <h1 style="font-size:clamp(2.3rem,7vw,4rem)">Administration</h1>
      <form id="login-form">
        <div class="field">
          <label for="password">Mot de passe administrateur</label>
          <input id="password" name="password" type="password" required autocomplete="current-password">
        </div>
        <div class="form-actions"><button type="submit">Entrer</button></div>
        <p id="login-notice" hidden></p>
      </form>
    </section>

    <section id="admin-panel" class="hidden">
      <div class="admin-toolbar">
        <div><p class="eyebrow">Table de jardinage en ligne</p><h1 style="font-size:clamp(2.4rem,7vw,5rem)">Administrer</h1></div>
        <button id="logout-button" class="secondary">Se déconnecter</button>
      </div>
      <p id="admin-notice" hidden></p>

      <p class="notice">Les modifications sont enregistrées dans Netlify et restent présentes après les nouveaux déploiements.</p>

      <details class="admin-section" open>
        <summary>Message du jardin</summary>
        <div class="admin-panel">
          <form id="garden-message-form" class="form-grid">
            <div class="field full">
              <label for="garden-message-input">Message affiché en grand sur l’accueil</label>
              <textarea id="garden-message-input" name="message" maxlength="300" required></textarea>
            </div>
            <div class="form-actions"><button type="submit">Mettre à jour</button></div>
          </form>
        </div>
      </details>

      <details class="admin-section">
        <summary>Chat local</summary>
        <div class="admin-panel"><div id="admin-wall-list"></div></div>
      </details>

      <details class="admin-section">
        <summary>Résidences et événements</summary>
        <div class="admin-panel">
          <form id="residence-form" enctype="multipart/form-data" class="form-grid">
            <div class="field"><label>Titre</label><input name="title" required></div>
            <div class="field"><label>Artiste / collectif</label><input name="artist" required></div>
            <div class="field"><label>Date de début</label><input name="date_start" type="date"></div>
            <div class="field"><label>Date de fin</label><input name="date_end" type="date"></div>
            <div class="field full"><label>Date affichée librement</label><input name="date_label" placeholder="Octobre 2026"></div>
            <div class="field full"><label>Présentation</label><textarea name="presentation" required></textarea></div>
            <div class="field full"><label>Images, sons ou PDF — 8 fichiers maximum</label><input name="files" type="file" multiple accept="image/*,audio/*,.pdf,.txt,.md"></div>
            <div class="form-actions"><button type="submit">Ajouter</button></div>
          </form>
          <div id="admin-residences-list"></div>
        </div>
      </details>

      <details class="admin-section">
        <summary>Sons</summary>
        <div class="admin-panel">
          <form id="sound-form" enctype="multipart/form-data" class="form-grid">
            <div class="field"><label>Titre</label><input name="title" required></div>
            <div class="field"><label>Lieu</label><input name="location"></div>
            <div class="field"><label>Date</label><input name="recorded_at" type="date"></div>
            <div class="field"><label>Fichier audio</label><input name="audio" type="file" accept="audio/*,.mp3,.ogg,.wav,.m4a" required></div>
            <div class="field full"><label>Description</label><textarea name="description"></textarea></div>
            <div class="form-actions"><button type="submit">Ajouter</button></div>
          </form>
          <div id="admin-sounds-list"></div>
        </div>
      </details>

      <details class="admin-section">
        <summary>Faune &amp; flore</summary>
        <div class="admin-panel">
          <form id="species-form" enctype="multipart/form-data" class="form-grid">
            <div class="field"><label>Nom commun</label><input name="common_name" required></div>
            <div class="field"><label>Nom latin</label><input name="latin_name"></div>
            <div class="field"><label>Type</label><select name="type"><option>plante</option><option>oiseau</option><option>insecte</option><option>mammifère</option><option>champignon</option><option>autre</option></select></div>
            <div class="field"><label>Date d’observation</label><input name="observed_at" type="date"></div>
            <div class="field"><label>Zone du jardin</label><input name="zone"></div>
            <div class="field"><label>Image</label><input name="image" type="file" accept="image/*"></div>
            <div class="field full"><label>Description</label><textarea name="description"></textarea></div>
            <div class="form-actions"><button type="submit">Ajouter</button></div>
          </form>
          <div id="admin-species-list"></div>
        </div>
      </details>

      <details class="admin-section">
        <summary>Documentation</summary>
        <div class="admin-panel">
          <form id="document-form" enctype="multipart/form-data" class="form-grid">
            <div class="field"><label>Titre</label><input name="title" required></div>
            <div class="field"><label>Type</label><select name="type"><option>texte</option><option>pdf</option><option>image</option><option>protocole</option><option>plan</option><option>notice</option></select></div>
            <div class="field full"><label>Description</label><textarea name="description"></textarea></div>
            <div class="field full"><label>Texte consultable directement</label><textarea name="body"></textarea></div>
            <div class="field full"><label>Fichier</label><input name="file" type="file" accept="image/*,.pdf,.txt,.md"></div>
            <div class="form-actions"><button type="submit">Ajouter</button></div>
          </form>
          <div id="admin-documents-list"></div>
        </div>
      </details>
    </section>
  </main>
  <script src="/assets/admin.js" defer></script>
</body>
</html>
